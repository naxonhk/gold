<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Tracker - Real-time Gold Price</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* Auth Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        /* Price Source Selector */
        .source-selector {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .source-selector h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .source-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .source-option {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .source-option:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .source-option.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
        }
        
        /* Gold Price Cards */
        .price-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .price-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .price-card h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .price-row:last-child {
            border-bottom: none;
        }
        
        .price-label {
            color: #aaa;
        }
        
        .price-value {
            font-weight: bold;
            font-size: 18px;
        }
        
        .price-value.sell {
            color: #4ade80;
        }
        
        .price-value.buy {
            color: #f87171;
        }
        
        .price-value.exchange {
            color: #60a5fa;
        }
        
        .last-update {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        
        /* Calculator Section */
        .calculator {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .calculator h3 {
            margin-bottom: 20px;
            color: #ffd700;
        }
        
        .calc-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .calc-inputs input, .calc-inputs select {
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        
        .calc-result {
            background: rgba(255,215,0,0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .calc-result .value {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* User Records */
        .records-section {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
        }
        
        .records-section h3 {
            margin-bottom: 20px;
            color: #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .record-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .record-form input, .record-form select {
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .records-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .record-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .record-info {
            flex: 1;
        }
        
        .record-date {
            color: #888;
            font-size: 12px;
        }
        
        .record-details {
            color: #ccc;
            font-size: 14px;
        }
        
        .record-value {
            font-weight: bold;
            color: #ffd700;
        }
        
        .record-delete {
            background: rgba(248,113,113,0.3);
            color: #f87171;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #ffd700;
        }
        
        /* Hide sections when logged out */
        .logged-out {
            display: none;
        }
        
        .user-email {
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🥇 Gold Tracker</div>
            <div class="user-section">
                <span id="userEmail" class="user-email"></span>
                <button id="loginBtn" class="btn btn-primary">Login</button>
                <button id="registerBtn" class="btn btn-secondary">Register</button>
                <button id="logoutBtn" class="btn btn-secondary" style="display:none;">Logout</button>
            </div>
        </header>
        
        <!-- Auth Modal -->
        <div id="authModal" class="modal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle" style="margin-bottom: 20px;">Login</h2>
                <form id="authForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="emailInput" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="passwordInput" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit</button>
                </form>
            </div>
        </div>
        
        <!-- Price Source Selector -->
        <div class="source-selector">
            <h3>📊 Select Gold Price Source</h3>
            <div class="source-options">
                <div class="source-option active" data-source="chowtaifook">Chow Tai Fook</div>
                <div class="source-option" data-source="chowsangsang">Chow Sang Sang</div>
            </div>
        </div>
        
        <!-- Price Display -->
        <div class="price-display" id="priceDisplay">
            <div class="loading">Loading gold prices...</div>
        </div>
        
        <div class="last-update" id="lastUpdate"></div>
        
        <!-- Calculator (Logged in) -->
        <div class="calculator logged-out" id="calculator">
            <h3>🧮 Gold Calculator</h3>
            <div class="calc-inputs">
                <input type="number" id="goldWeight" placeholder="Weight (tael)">
                <select id="calcType">
                    <option value="sell">Calculate Sell Price</option>
                    <option value="buy">Calculate Buy Price</option>
                </select>
                <button class="btn btn-primary" onclick="calculate()">Calculate</button>
            </div>
            <div class="calc-result" id="calcResult" style="display: none;">
                <div>Estimated Value</div>
                <div class="value" id="calcValue">HK$ 0</div>
            </div>
        </div>
        
        <!-- User Records (Logged in) -->
        <div class="records-section logged-out" id="recordsSection">
            <h3>
                📝 My Gold Records
                <button class="btn btn-primary" onclick="showRecordForm()">+ Add Record</button>
            </h3>
            
            <!-- Add Record Form -->
            <div id="recordForm" style="display: none; margin-bottom: 20px;">
                <div class="record-form">
                    <input type="number" id="recordWeight" placeholder="Weight (tael)">
                    <select id="recordType">
                        <option value="sell">Sell Price</option>
                        <option value="buy">Buy Price</option>
                    </select>
                    <input type="number" id="recordPrice" placeholder="Price per tael">
                    <input type="text" id="recordNote" placeholder="Note (optional)">
                    <button class="btn btn-primary" onclick="saveRecord()">Save</button>
                    <button class="btn btn-secondary" onclick="hideRecordForm()">Cancel</button>
                </div>
            </div>
            
            <div class="records-list" id="recordsList">
                <p style="color: #888; text-align: center;">No records yet. Add your first record!</p>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDTAQgCvZO7Q9Y9A2rSWf0HL1uyA0iJwj4",
            authDomain: "gold-6b24b.firebaseapp.com",
            projectId: "gold-6b24b",
            storageBucket: "gold-6b24b.firebasestorage.app",
            messagingSenderId: "1095159481868",
            appId: "1:1095159481868:web:af30df2ff4cc0427e05029"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Make auth and db available globally
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.query = query;
        window.orderBy = orderBy;
        
        // Trigger initial setup
        window.dispatchEvent(new Event('firebaseReady'));
    </script>
    
    <script>
        // Global state
        let currentUser = null;
        let currentSource = 'chowtaifook';
        let goldPrices = {
            chowtaifook: {},
            chowsangsang: {}
        };
        
        // Price Source Selector
        document.querySelectorAll('.source-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.source-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                currentSource = option.dataset.source;
                displayPrices();
            });
        });
        
        // Auth Modal Functions
        const authModal = document.getElementById('authModal');
        const modalTitle = document.getElementById('modalTitle');
        let isLoginMode = true;
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            isLoginMode = true;
            modalTitle.textContent = 'Login';
            authModal.classList.add('active');
        });
        
        document.getElementById('registerBtn').addEventListener('click', () => {
            isLoginMode = false;
            modalTitle.textContent = 'Register';
            authModal.classList.add('active');
        });
        
        function closeModal() {
            authModal.classList.remove('active');
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
        }
        
        // Auth Form Submit
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            try {
                if (isLoginMode) {
                    await window.signInWithEmailAndPassword(window.firebaseAuth, email, password);
                } else {
                    await window.createUserWithEmailAndPassword(window.firebaseAuth, email, password);
                }
                closeModal();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await window.signOut(window.firebaseAuth);
        });
        
        // Auth State Change
        window.addEventListener('firebaseReady', () => {
            window.onAuthStateChanged(window.firebaseAuth, (user) => {
                currentUser = user;
                updateUI();
                if (user) {
                    loadRecords();
                }
            });
        });
        
        function updateUI() {
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const userEmail = document.getElementById('userEmail');
            const calculator = document.getElementById('calculator');
            const recordsSection = document.getElementById('recordsSection');
            
            if (currentUser) {
                loginBtn.style.display = 'none';
                registerBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                userEmail.textContent = currentUser.email;
                calculator.classList.remove('logged-out');
                recordsSection.classList.remove('logged-out');
            } else {
                loginBtn.style.display = 'block';
                registerBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                userEmail.textContent = '';
                calculator.classList.add('logged-out');
                recordsSection.classList.add('logged-out');
            }
        }
        
        // Record Functions
        function showRecordForm() {
            document.getElementById('recordForm').style.display = 'block';
            // Pre-fill with current price
            const prices = goldPrices[currentSource];
            if (document.getElementById('recordType').value === 'sell' && prices.sell) {
                document.getElementById('recordPrice').value = prices.sell;
            } else if (document.getElementById('recordType').value === 'buy' && prices.buy) {
                document.getElementById('recordPrice').value = prices.buy;
            }
        }
        
        function hideRecordForm() {
            document.getElementById('recordForm').style.display = 'none';
            document.getElementById('recordWeight').value = '';
            document.getElementById('recordPrice').value = '';
            document.getElementById('recordNote').value = '';
        }
        
        async function saveRecord() {
            if (!currentUser) return;
            
            const weight = parseFloat(document.getElementById('recordWeight').value);
            const type = document.getElementById('recordType').value;
            const price = parseFloat(document.getElementById('recordPrice').value);
            const note = document.getElementById('recordNote').value;
            
            if (!weight || !price) {
                alert('Please fill in weight and price');
                return;
            }
            
            try {
                await window.addDoc(window.collection(window.firebaseDb, 'users', currentUser.uid, 'records'), {
                    weight,
                    type,
                    price,
                    note,
                    total: weight * price,
                    source: currentSource,
                    createdAt: new Date().toISOString()
                });
                hideRecordForm();
            } catch (error) {
                alert('Error saving record: ' + error.message);
            }
        }
        
        function loadRecords() {
            if (!currentUser) return;
            
            const recordsList = document.getElementById('recordsList');
            const q = window.query(
                window.collection(window.firebaseDb, 'users', currentUser.uid, 'records'),
                window.orderBy('createdAt', 'desc')
            );
            
            window.onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    recordsList.innerHTML = '<p style="color: #888; text-align: center;">No records yet. Add your first record!</p>';
                    return;
                }
                
                recordsList.innerHTML = '';
                snapshot.forEach(doc => {
                    const record = doc.data();
                    const div = document.createElement('div');
                    div.className = 'record-item';
                    div.innerHTML = `
                        <div class="record-info">
                            <div class="record-date">${new Date(record.createdAt).toLocaleDateString()}</div>
                            <div class="record-details">${record.weight} tael × HK$${record.price.toLocaleString()} (${record.type})</div>
                            ${record.note ? `<div class="record-details">📝 ${record.note}</div>` : ''}
                        </div>
                        <div class="record-value">HK$ ${record.total.toLocaleString()}</div>
                        <button class="record-delete" onclick="deleteRecord('${doc.id}')">Delete</button>
                    `;
                    recordsList.appendChild(div);
                });
            });
        }
        
        window.deleteRecord = async function(id) {
            if (!currentUser) return;
            if (!confirm('Delete this record?')) return;
            
            try {
                await window.deleteDoc(window.doc(window.firebaseDb, 'users', currentUser.uid, 'records', id));
            } catch (error) {
                alert('Error deleting record: ' + error.message);
            }
        };
        
        // Calculator
        window.calculate = function() {
            const weight = parseFloat(document.getElementById('goldWeight').value);
            const type = document.getElementById('calcType').value;
            const prices = goldPrices[currentSource];
            
            if (!weight) {
                alert('Please enter weight');
                return;
            }
            
            const price = type === 'sell' ? prices.sell : prices.buy;
            if (!price) {
                alert('Price not available');
                return;
            }
            
            const total = weight * price;
            document.getElementById('calcValue').textContent = 'HK$ ' + total.toLocaleString();
            document.getElementById('calcResult').style.display = 'block';
        };
        
        // Display Prices
        function displayPrices() {
            const prices = goldPrices[currentSource];
            const display = document.getElementById('priceDisplay');
            
            if (Object.keys(prices).length === 0) {
                display.innerHTML = '<div class="loading">Loading gold prices...</div>';
                return;
            }
            
            let html = '';
            
            if (currentSource === 'chowtaifook') {
                html = `
                    <div class="price-card">
                        <h3>🏪 Chow Tai Fook - 999.9 Gold</h3>
                        <div class="price-row">
                            <span class="price-label">Sell Price (per tael)</span>
                            <span class="price-value sell">HK$ ${prices.sell?.toLocaleString() || 'N/A'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Buy Price (per tael)</span>
                            <span class="price-value buy">HK$ ${prices.buy?.toLocaleString() || 'N/A'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Sell Price (per gram)</span>
                            <span class="price-value sell">HK$ ${prices.sellGram?.toLocaleString() || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="price-card">
                        <h3>🏪 Chow Tai Fook - Gold Pellet</h3>
                        <div class="price-row">
                            <span class="price-label">Sell Price (per tael)</span>
                            <span class="price-value sell">HK$ ${prices.pelletSell?.toLocaleString() || 'N/A'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Buy Price (per tael)</span>
                            <span class="price-value buy">HK$ ${prices.pelletBuy?.toLocaleString() || 'N/A'}</span>
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="price-card">
                        <h3>🏪 Chow Sang Sang - Gold Ornaments</h3>
                        <div class="price-row">
                            <span class="price-label">Sell Price (per tael)</span>
                            <span class="price-value sell">HK$ ${prices.sell?.toLocaleString() || 'N/A'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Exchange Price (per tael)</span>
                            <span class="price-value exchange">HK$ ${prices.exchange?.toLocaleString() || 'N/A'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Buy Price (per tael)</span>
                            <span class="price-value buy">HK$ ${prices.buy?.toLocaleString() || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="price-card">
                        <h3>🏪 Chow Sang Sang - Gold Ingot</h3>
                        <div class="price-row">
                            <span class="price-label">Sell Price (per tael)</span>
                            <span class="price-value sell">HK$ ${prices.ingotSell?.toLocaleString() || 'N/A'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Buy Price (per tael)</span>
                            <span class="price-value buy">HK$ ${prices.ingotBuy?.toLocaleString() || 'N/A'}</span>
                        </div>
                    </div>
                `;
            }
            
            display.innerHTML = html;
            document.getElementById('lastUpdate').textContent = 'Last updated: ' + new Date().toLocaleString();
        }
        
        // Fetch Gold Prices (Scraping via proxy)
        async function fetchGoldPrices() {
            try {
                // Using a CORS proxy to fetch the pages
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                
                // Fetch Chow Tai Fook
                try {
                    const ctfResponse = await fetch(proxyUrl + encodeURIComponent('https://www.chowtaifook.com/en-hk/eshop/realtime-gold-price.html'));
                    const ctfHtml = await ctfResponse.text();
                    
                    // Parse CTF prices
